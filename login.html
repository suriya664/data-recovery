<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Data Recovery Client Portal</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1E40AF', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { bg: '#0F172A', card: '#1E293B', text: '#F1F5F9' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .split-bg {
            background-image: url('https://images.unsplash.com/photo-1558494949-efc52728101c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-dark-bg text-slate-800 dark:text-dark-text min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <!-- Theme Toggle (Absolute) -->
    <button
        class="theme-toggle absolute top-6 right-6 p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition text-slate-600 dark:text-yellow-400 z-50">
        <i class="fa-solid fa-moon dark:hidden"></i>
        <i class="fa-solid fa-sun hidden dark:block"></i>
    </button>

    <!-- Main Card Container -->
    <div class="w-full max-w-lg">
        <div
            class="bg-white dark:bg-dark-card rounded-2xl shadow-xl p-6 md:p-12 border border-slate-100 dark:border-slate-800 mx-auto">

            <!-- Logo & Brand - Centered -->
            <div class="text-center mb-8 md:mb-10">
                <a href="index.html"
                    class="inline-flex items-center gap-2 md:gap-3 text-2xl md:text-3xl font-bold text-primary-600 dark:text-blue-400 mb-4 md:mb-6">
                    <i class="fa-solid fa-shield-halved text-3xl md:text-4xl"></i>
                    <span>DataRecovery</span>
                </a>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white mb-2">Client Portal Login</h1>
                <p class="text-sm md:text-base text-slate-600 dark:text-slate-400 px-2">Access your recovery cases
                    securely</p>
            </div>

            <!-- Standard Login Form -->
            <form action="dashboard-client.html" class="space-y-6" id="login-form">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email
                        Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" placeholder="Enter your email"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white transition"
                            required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" placeholder="Enter your password"
                            class="w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white transition"
                            required>
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-600 dark:text-slate-400 cursor-pointer">
                        <input type="checkbox" class="rounded text-primary-600 focus:ring-primary-500 border-gray-300">
                        Remember me
                    </label>
                    <a href="#" class="font-medium text-primary-600 hover:text-primary-500">Forgot password?</a>
                </div>

                <button type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-primary-600/30 transition transform hover:-translate-y-0.5">
                    Sign In
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white dark:bg-dark-card text-slate-500">OR</span>
                </div>
            </div>

            <!-- Case ID Login Toggle -->
            <div class="text-center">
                <button type="button"
                    onclick="document.getElementById('case-login-form').classList.toggle('hidden'); document.getElementById('login-form').classList.toggle('hidden');"
                    class="text-primary-600 font-medium hover:underline text-sm">
                    Log in with Case ID instead
                </button>
            </div>

            <!-- Case ID Form (Hidden by default) -->
            <form action="dashboard-client.html" class="space-y-6 hidden mt-6" id="case-login-form">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Case ID</label>
                    <input type="text" placeholder="e.g. DR-2024-XXXX"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500 dark:text-white uppercase">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email
                        Address</label>
                    <input type="email" placeholder="Email associated with case"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500 dark:text-white">
                </div>
                <button type="submit"
                    class="w-full bg-slate-800 hover:bg-slate-900 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-200 text-white font-bold py-3 rounded-lg transition">
                    Access Case
                </button>
                <div class="text-center">
                    <button type="button"
                        onclick="document.getElementById('case-login-form').classList.toggle('hidden'); document.getElementById('login-form').classList.toggle('hidden');"
                        class="text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                        &larr; Back to Account Login
                    </button>
                </div>
            </form>

            <div class="mt-10 text-center text-sm text-slate-600 dark:text-slate-400">
                Don't have an account?
                <a href="register.html" class="font-bold text-primary-600 hover:text-primary-500">Create Account</a>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
                <p class="text-xs text-slate-400 flex items-center justify-center gap-1">
                    <i class="fa-solid fa-lock text-green-500"></i> Encrypted Connection
                </p>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
